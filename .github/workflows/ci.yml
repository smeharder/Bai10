name: Java CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # Thêm cache để build nhanh hơn

      - name: Build and Test with Maven
        run: mvn clean verify # Dùng verify để chạy cả unit test và checkstyle (nếu có)
